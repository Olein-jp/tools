name: Deploy to Rental Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Add deploy marker
        run: |
          echo "run_id=${GITHUB_RUN_ID}" > dist/__deploy_check.txt
          echo "sha=${GITHUB_SHA}" >> dist/__deploy_check.txt
          date -u +"built_at_utc=%Y-%m-%dT%H:%M:%SZ" >> dist/__deploy_check.txt
          ls -la dist

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: ./dist/
          log-level: verbose
